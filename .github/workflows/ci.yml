name: Branch Based CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current branch
        uses: actions/checkout@v4

      - name: Detect branch and assign defaults
        run: |
          BRANCH="${GITHUB_REF_NAME}"

          echo "Branch detected: $BRANCH"

          if [ "$BRANCH" = "hello-world" ]; then
            echo "CODE_FILE=hello.py" >> $GITHUB_ENV
            echo "TEST_FILE=test_hello.py" >> $GITHUB_ENV

          elif [ "$BRANCH" = "math-app" ]; then
            echo "CODE_FILE=math_app.py" >> $GITHUB_ENV
            echo "TEST_FILE=test_math.py" >> $GITHUB_ENV

          else
            echo "Unknown branch"
            exit 1
          fi

      - name: Show selected configuration
        run: |
          echo "Code File: $CODE_FILE"
          echo "Test File: $TEST_FILE"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install pytest
        run: pip install pytest

      - name: Run Code
        run: python $CODE_FILE

      - name: Run Tests
        run: pytest $TEST_FILE -v

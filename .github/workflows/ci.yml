name: Branch Based CI

on:
  workflow_dispatch:
    inputs:

      target_branch:
        description: "Select Branch"
        required: true
        type: choice
        options:
          - hello-world
          - math-app

      code_file:
        description: "Select Code File"
        required: true
        type: choice
        options:
          - hello.py
          - math_app.py

      test_file:
        description: "Select Test File"
        required: true
        type: choice
        options:
          - test_hello.py
          - test_math.py

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout selected branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_branch }}

      - name: Validate branch and files
        run: |
          BRANCH="${{ github.event.inputs.target_branch }}"
          CODE="${{ github.event.inputs.code_file }}"
          TEST="${{ github.event.inputs.test_file }}"

          echo "Branch: $BRANCH"
          echo "Code File: $CODE"
          echo "Test File: $TEST"

          if [ "$BRANCH" = "hello-world" ]; then
            if [ "$CODE" != "hello.py" ] || [ "$TEST" != "test_hello.py" ]; then
              echo "Invalid files selected for hello-world branch"
              exit 1
            fi
          fi

          if [ "$BRANCH" = "math-app" ]; then
            if [ "$CODE" != "math_app.py" ] || [ "$TEST" != "test_math.py" ]; then
              echo "Invalid files selected for math-app branch"
              exit 1
            fi
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install pytest
        run: pip install pytest

      - name: Run code file
        run: python ${{ github.event.inputs.code_file }}

      - name: Run test file
        run: pytest ${{ github.event.inputs.test_file }} -v

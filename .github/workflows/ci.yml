name: Branch CI

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to test"
        required: true
        default: "main"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout selected branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Detect branch defaults
        run: |
          BRANCH="${{ github.event.inputs.branch }}"

          if [ "$BRANCH" = "hello-world" ]; then
            CODE="hello.py"
            TEST="test_hello.py"
          elif [ "$BRANCH" = "math-app" ]; then
            CODE="math_app.py"
            TEST="test_math.py"
          else
            echo "Unknown branch: $BRANCH"
            exit 1
          fi

          echo "CODE=$CODE" >> $GITHUB_ENV
          echo "TEST=$TEST" >> $GITHUB_ENV

      - name: Show Summary (GitHub UI)
        run: |
          echo "## Branch Configuration" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.event.inputs.branch }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Code File | $CODE |" >> $GITHUB_STEP_SUMMARY
          echo "| Test File | $TEST |" >> $GITHUB_STEP_SUMMARY

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install pytest
        run: pip install pytest

      - name: Run program
        run: python $CODE

      - name: Run tests
        run: pytest $TEST -v --tb=short

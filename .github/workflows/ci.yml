name: Branch Based CI

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Select Branch"
        required: true
        type: choice
        options:
          - hello-world
          - math-app

      target_file:
        description: "Select File"
        required: true
        type: choice
        options:
          - hello.py
          - test_hello.py
          - math_app.py
          - test_math.py

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout selected branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_branch }}

      - name: Validate file belongs to branch
        run: |
          BRANCH="${{ github.event.inputs.target_branch }}"
          FILE="${{ github.event.inputs.target_file }}"

          if [ "$BRANCH" = "hello-world" ]; then
            if [[ "$FILE" != "hello.py" && "$FILE" != "test_hello.py" ]]; then
              echo "Invalid file for hello-world branch"
              exit 1
            fi
          fi

          if [ "$BRANCH" = "math-app" ]; then
            if [[ "$FILE" != "math_app.py" && "$FILE" != "test_math.py" ]]; then
              echo "Invalid file for math-app branch"
              exit 1
            fi
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install pytest
        run: pip install pytest

      - name: Run selected file
        run: python ${{ github.event.inputs.target_file }}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Branch File Explorer CI</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #0d1117;
    color: #e6edf3;
    padding: 20px;
  }

  .box {
    max-width: 700px;
    margin: auto;
    background: #161b22;
    padding: 20px;
    border-radius: 10px;
    border: 1px solid #30363d;
  }

  select, input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    background: #0d1117;
    color: white;
    border: 1px solid #30363d;
    border-radius: 6px;
  }

  button {
    width: 100%;
    padding: 10px;
    background: #238636;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }

  button:disabled {
    background: gray;
    cursor: not-allowed;
  }

  .file-list {
    margin-top: 15px;
    padding: 10px;
    background: #0d1117;
    border-radius: 6px;
    border: 1px solid #30363d;
  }

  .file {
    padding: 5px;
    border-bottom: 1px solid #222;
    font-size: 13px;
  }

  .title {
    margin-top: 10px;
    font-weight: bold;
    color: #58a6ff;
  }

  .status {
    margin-top: 10px;
    font-size: 13px;
  }
</style>
</head>

<body>

<div class="box">

<h2>CI Branch File Explorer</h2>

<input id="token" type="password" placeholder="GitHub Token (ghp_...)" />

<select id="branch">
  <option value="">Select Branch</option>
  <option value="main">main</option>
  <option value="hello-world">hello-world</option>
  <option value="math-app">math-app</option>
</select>

<button onclick="loadFiles()">Load Files</button>

<div class="title">Files in Branch</div>
<div class="file-list" id="files">No data</div>

<div class="title">Select Code File</div>
<select id="codeFile"></select>

<div class="title">Select Test File</div>
<select id="testFile"></select>

<button onclick="runCI()">Run Workflow</button>

<div class="status" id="status"></div>

</div>

<script>
const OWNER = "YOUR_USERNAME";
const REPO = "YOUR_REPO";
const WORKFLOW = "branch-ci.yml";

async function loadFiles() {
  const branch = document.getElementById("branch").value;
  const token = document.getElementById("token").value;

  const fileBox = document.getElementById("files");
  const codeSel = document.getElementById("codeFile");
  const testSel = document.getElementById("testFile");

  if (!branch) {
    alert("Select branch");
    return;
  }

  fileBox.innerHTML = "Loading...";

  try {
    const res = await fetch(
      `https://api.github.com/repos/${OWNER}/${REPO}/contents?ref=${branch}`,
      {
        headers: {
          "Authorization": `Bearer ${token}`
        }
      }
    );

    const data = await res.json();

    if (!Array.isArray(data)) {
      fileBox.innerHTML = "Error loading files (check token / repo)";
      return;
    }

    const files = data.map(f => f.path);

    fileBox.innerHTML = files.map(f => `<div class="file">${f}</div>`).join("");

    const codeFiles = files.filter(f => f.endsWith(".py") && !f.startsWith("test"));
    const testFiles = files.filter(f => f.startsWith("test") && f.endsWith(".py"));

    codeSel.innerHTML = codeFiles.map(f => `<option value="${f}">${f}</option>`).join("");
    testSel.innerHTML = testFiles.map(f => `<option value="${f}">${f}</option>`).join("");

  } catch (e) {
    fileBox.innerHTML = "Failed to load files";
  }
}

async function runCI() {
  const token = document.getElementById("token").value;
  const branch = document.getElementById("branch").value;
  const codeFile = document.getElementById("codeFile").value;
  const testFile = document.getElementById("testFile").value;

  const status = document.getElementById("status");

  status.innerHTML = "Triggering workflow...";

  const res = await fetch(
    `https://api.github.com/repos/${OWNER}/${REPO}/actions/workflows/${WORKFLOW}/dispatches`,
    {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${token}`,
        "Accept": "application/vnd.github+json",
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        ref: "main",
        inputs: {
          branch,
          program_file: codeFile,
          test_file: testFile
        }
      })
    }
  );

  if (res.status === 204) {
    status.innerHTML = "Workflow triggered successfully ✅";
  } else {
    const err = await res.json().catch(()=>({}));
    status.innerHTML = "Error: " + (err.message || res.status);
  }
}
</script>

</body>
</html>

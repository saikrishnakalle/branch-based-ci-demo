<script>
const OWNER = "YOUR_USERNAME";
const REPO  = "YOUR_REPO";
const WORKFLOW_FILE = "branch-ci.yml";

let currentBranchFiles = [];

document.getElementById("branch").addEventListener("change", loadBranchFiles);

async function loadBranchFiles() {
  const branch = document.getElementById("branch").value;
  const preview = document.getElementById("preview");

  if (!branch) return;

  preview.innerHTML = "Loading files...";

  const res = await fetch(
    `https://api.github.com/repos/${OWNER}/${REPO}/contents?ref=${branch}`
  );

  const files = await res.json();

  // store files globally
  currentBranchFiles = files.map(f => f.path);

  // filter python files
  const codeFiles = currentBranchFiles.filter(f =>
    f.endsWith(".py") && !f.startsWith("test_")
  );

  const testFiles = currentBranchFiles.filter(f =>
    f.startsWith("test_") && f.endsWith(".py")
  );

  preview.innerHTML = `
    <label>Code File</label>
    <select id="codeSelect">
      ${codeFiles.map(f => `<option value="${f}">${f}</option>`).join("")}
    </select>

    <label>Test File</label>
    <select id="testSelect">
      ${testFiles.map(f => `<option value="${f}">${f}</option>`).join("")}
    </select>
  `;

  document.getElementById("runBtn").disabled = false;
}

async function runWorkflow() {
  const token = document.getElementById("token").value;
  const branch = document.getElementById("branch").value;

  const codeFile = document.getElementById("codeSelect").value;
  const testFile = document.getElementById("testSelect").value;

  const res = await fetch(
    `https://api.github.com/repos/${OWNER}/${REPO}/actions/workflows/${WORKFLOW_FILE}/dispatches`,
    {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${token}`,
        "Accept": "application/vnd.github+json",
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        ref: "main",
        inputs: {
          branch: branch,
          program_file: codeFile,
          test_file: testFile
        }
      })
    }
  );

  alert(res.status === 204 ? "Workflow triggered" : "Error triggering workflow");
}
</script>
